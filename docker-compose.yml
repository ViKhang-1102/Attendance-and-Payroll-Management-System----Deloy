services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M

  app:
    build:
      context: ./attendance
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/attendance_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: your-256-bit-secret-key-here-make-it-very-long-and-secure-at-least-32-characters
      JAVA_OPTS: "-Xmx384m -XX:MaxRAMPercentage=75.0"
    depends_on:
      - db
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://app:8080
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://app:8080
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres-data:
